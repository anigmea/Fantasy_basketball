steps:
# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      "build",
      "-t",
      "us-west2-docker.pkg.dev/$PROJECT_ID/quickstart-docker-repo/quickstart-image:tag1",
      "."
    ]

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      "run", "deploy", "fantasy-basketball-assistant",
      "--image", "us-west2-docker.pkg.dev/$PROJECT_ID/quickstart-docker-repo/quickstart-image:tag1",
      "--region", "us-west2",
      "--platform", "managed",
      "--allow-unauthenticated",
      "--update-secrets",
      "FIREBASE_CREDENTIALS=firebase-credentials:latest",
      "API_KEY=API_KEY_SECRET:latest"
    ]

images:
- us-west2-docker.pkg.dev/$PROJECT_ID/quickstart-docker-repo/quickstart-image:tag1

options:
  logging: CLOUD_LOGGING_ONLY